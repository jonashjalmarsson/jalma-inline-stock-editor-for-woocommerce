<?xml version="1.0" encoding="UTF-8"?>
<!-- Jalma Quick Stock for WooCommerce icon
     Brand style: lime-green background, large serif letter centered,
     black footer strip with JALMA label. Matches simple-font and
     category-notifications pattern. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Green background -->
  <rect width="256" height="256" fill="#B3C734"/>

  <!-- Big serif "Q" centered in top region -->
  <text x="128" y="170"
        text-anchor="middle"
        font-family="Baskerville, Georgia, 'Times New Roman', serif"
        font-size="200"
        font-weight="400"
        fill="#080904">Q</text>

  <!-- Black footer strip -->
  <rect x="0" y="210" width="256" height="46" fill="#080904"/>

  <!-- JALMA label in footer -->
  <text x="128" y="242"
        text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="22"
        font-weight="700"
        letter-spacing="3"
        fill="#B3C734">JALMA</text>
</svg>
